---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yamllint ansible-lint ansible

      - name: yamllint
        run: yamllint .

      - name: ansible-lint
        run: ansible-lint

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible

      - name: Create dummy vault vars
        run: |
          mkdir -p group_vars/all
          cp preseed/tests/vars.yml group_vars/all/vault.yml

      - name: Syntax check site.yml
        run: ansible-playbook --syntax-check -i inventory.ini site.yml

      - name: Syntax check build-preseed.yml
        run: ansible-playbook --syntax-check -i inventory.ini preseed/build.yml

  render-test:
    name: Preseed Render Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: pip install ansible

      - name: Test preseed template rendering
        run: ansible-playbook -i inventory.ini preseed/tests/render_preseed.yml

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # GitHub Actions ubuntu-latest runners have KVM available; enable it so
      # any nested virtualisation inside Docker containers works smoothly.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Molecule
        run: molecule test
