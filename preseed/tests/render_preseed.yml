---
# Tests that preseed.cfg.j2 renders without errors and that the vault
# variable is substituted (no raw Jinja2 placeholder left in output).
- name: Test preseed template rendering
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars.yml

  tasks:
    - name: Render preseed.cfg from template
      ansible.builtin.template:
        src: ../preseed.cfg.j2
        dest: /tmp/preseed_test.cfg
        mode: "0600"

    - name: Read rendered preseed
      ansible.builtin.slurp:
        src: /tmp/preseed_test.cfg
      register: preseed_content

    - name: Assert Jinja2 placeholder was substituted
      ansible.builtin.assert:
        that:
          - "'vault_dvorst_password_hash' not in (preseed_content.content | b64decode)"
          - "'FAKEHASHFORTESTINGONLY' in (preseed_content.content | b64decode)"
        fail_msg: "preseed.cfg.j2 still contains unrendered Jinja2 placeholder"

    - name: Remove rendered test file
      ansible.builtin.file:
        path: /tmp/preseed_test.cfg
        state: absent
